spring:
  sql:
    init:
      mode: never

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true

app:
  jwt:
    secret: "VGVzdFNlY3JldEtleUZvckpXVDI1NkJpdHNNdXN0QmVMb25nRW5vdWdoRm9ySExT"
    expiration-ms: 86400000

logging:
  level:
    com.hyperreset: DEBUG
