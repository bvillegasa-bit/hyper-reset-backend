spring:
  application:
    name: hyper-reset-api

  datasource:
    url: jdbc:mysql://localhost:3306/HyperReset?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: hyperreset
    password: hyperreset123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  jwt:
    secret: "SHlwZXJSZXNldDIwMjRTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25NdXN0QmUyNTZCaXRzTG9uZyE="
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ============================================
# Scoring Threshold Configuration
# ============================================
test-scoring:
  thresholds:
    illinois:
      excelente-max: 15.0
      bueno-max: 16.0
      regular-max: 17.5
      lower-is-better: true
    flexion-codos:
      excelente-max: 40
      bueno-max: 30
      regular-max: 20
      lower-is-better: false
    velocidad-20m:
      excelente-max: 3.0
      bueno-max: 3.3
      regular-max: 3.8
      lower-is-better: true
    velocidad-reaccion:
      excelente-max: 0.15
      bueno-max: 0.20
      regular-max: 0.30
      lower-is-better: true
    salto-horizontal:
