spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/HyperReset?useSSL=true&requireSSL=true&serverTimezone=UTC}
    username: ${DB_USERNAME:hyperreset}
    password: ${DB_PASSWORD:hyperreset123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}

logging:
  level:
    com.hyperreset: WARN
    org.springframework: WARN
